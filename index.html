<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dashboard</title>
<style>
  :root{
    --bg:#0f1115; --card:#181b22; --card2:#1f232c; --line:#2a2f3a;
    --txt:#e7e9ee; --muted:#9aa3b2; --accent:#6ea8fe; --green:#4ade80;
    --red:#f87171; --amber:#fbbf24; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;padding:24px;max-width:1200px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:24px}
  h1{font-size:26px;font-weight:700}
  .sub{color:var(--muted);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .card h2{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .l{display:flex;flex-direction:column}
  .item .t{font-size:14px}
  .item .m{font-size:12px;color:var(--muted)}
  .tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card2);color:var(--muted)}
  .tag.due{background:rgba(248,113,113,.15);color:var(--red)}
  .tag.soon{background:rgba(251,191,36,.15);color:var(--amber)}
  .tag.ok{background:rgba(74,222,128,.15);color:var(--green)}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .metric{background:var(--card2);border-radius:12px;padding:14px}
  .metric .v{font-size:24px;font-weight:700}
  .metric .k{font-size:12px;color:var(--muted)}
  .bar{height:8px;background:var(--card2);border-radius:999px;overflow:hidden;margin-top:8px}
  .bar>span{display:block;height:100%;background:var(--accent)}
  .fin-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
  .fin-row .amt{font-variant-numeric:tabular-nums}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .empty{color:var(--muted);font-size:13px;font-style:italic}
  footer{margin-top:28px;text-align:center;color:var(--muted);font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title">Mi Dashboard</h1>
    <div class="sub" id="owner"></div>
  </div>
  <div class="sub"><span class="dot"></span>Actualizado: <span id="updated">—</span></div>
</header>

<div class="grid">
  <section class="card">
    <h2>✅ Tareas / Proyectos</h2>
    <div id="tasks"></div>
  </section>

  <section class="card">
    <h2>📅 Calendario</h2>
    <div id="calendar"></div>
  </section>

  <section class="card">
    <h2>💰 Finanzas</h2>
    <div id="finance"></div>
  </section>

  <section class="card">
    <h2>📊 Métricas / Hábitos</h2>
    <div id="metrics" class="metrics"></div>
  </section>
</div>

<footer>Se actualiza solo vía GitHub Actions · Independiente de cualquier suscripción</footer>

<script>
// Fallback de ejemplo para que el dashboard funcione aunque no haya data.json todavía.
const SAMPLE = {
  title:"Mi Dashboard", owner:"Jose", updated:"(datos de ejemplo)",
  tasks:[
    {title:"Cerrar propuesta cliente X", meta:"Proyecto Alfa", status:"due", due:"Hoy"},
    {title:"Revisar diseño dashboard", meta:"Personal", status:"soon", due:"Mañana"},
    {title:"Enviar factura mayo", meta:"Admin", status:"ok", due:"3 jun"}
  ],
  calendar:[
    {title:"Standup equipo", meta:"09:30 – 09:45"},
    {title:"Call con proveedor", meta:"13:00 – 13:30"},
    {title:"Gym", meta:"19:00 – 20:00"}
  ],
  finance:{
    summary:[{k:"Balance mes",v:"+1,240",pos:true},{k:"Gastos",v:"-820",pos:false}],
    rows:[
      {label:"Ingresos",amount:"+2,060",pos:true},
      {label:"Suscripciones",amount:"-180",pos:false},
      {label:"Comida",amount:"-310",pos:false},
      {label:"Transporte",amount:"-90",pos:false}
    ]
  },
  metrics:[
    {k:"Pasos hoy",v:"7,420",pct:74},
    {k:"Agua (vasos)",v:"5 / 8",pct:62},
    {k:"Tareas hechas",v:"3 / 5",pct:60},
    {k:"Foco (h)",v:"4.2",pct:84}
  ]
};

function tag(s,due){
  const cls = s==='due'?'due':s==='soon'?'soon':'ok';
  return `<span class="tag ${cls}">${due||''}</span>`;
}

function render(d){
  document.getElementById('title').textContent = d.title || 'Mi Dashboard';
  document.getElementById('owner').textContent = d.owner ? `de ${d.owner}` : '';
  document.getElementById('updated').textContent = d.updated || '—';

  const tasks = document.getElementById('tasks');
  tasks.innerHTML = (d.tasks&&d.tasks.length) ? d.tasks.map(t=>`
    <div class="item"><div class="l"><span class="t">${t.title}</span>
    <span class="m">${t.meta||''}</span></div>${tag(t.status,t.due)}</div>`).join('')
    : '<div class="empty">Sin tareas. Conecta tu fuente o edita el Sheet.</div>';

  const cal = document.getElementById('calendar');
  cal.innerHTML = (d.calendar&&d.calendar.length) ? d.calendar.map(e=>`
    <div class="item"><div class="l"><span class="t">${e.title}</span>
    <span class="m">${e.meta||''}</span></div></div>`).join('')
    : '<div class="empty">Sin eventos próximos.</div>';

  const fin = document.getElementById('finance');
  let html='';
  if(d.finance&&d.finance.summary){
    html+='<div class="metrics" style="margin-bottom:12px">'+d.finance.summary.map(s=>`
      <div class="metric"><div class="v ${s.pos?'pos':'neg'}">${s.v}</div>
      <div class="k">${s.k}</div></div>`).join('')+'</div>';
  }
  if(d.finance&&d.finance.rows){
    html+=d.finance.rows.map(r=>`<div class="fin-row"><span>${r.label}</span>
      <span class="amt ${r.pos?'pos':'neg'}">${r.amount}</span></div>`).join('');
  }
  fin.innerHTML = html || '<div class="empty">Sin datos financieros.</div>';

  const met = document.getElementById('metrics');
  met.innerHTML = (d.metrics&&d.metrics.length) ? d.metrics.map(m=>`
    <div class="metric"><div class="v">${m.v}</div><div class="k">${m.k}</div>
    <div class="bar"><span style="width:${m.pct||0}%"></span></div></div>`).join('')
    : '<div class="empty">Sin métricas.</div>';
}

fetch('data.json',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw 0;return r.json()})
  .then(render)
  .catch(()=>render(SAMPLE));
</script>
</body>
</html>
