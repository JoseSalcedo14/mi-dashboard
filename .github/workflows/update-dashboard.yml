name: Actualizar dashboard

on:
  schedule:
    - cron: "0 * * * *"   # cada hora (UTC). Cambia la frecuencia si quieres.
  workflow_dispatch:        # botón para correrlo manualmente
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar data.json
        env:
          CAL_ICS_URL: ${{ secrets.CAL_ICS_URL }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python build_data.py

      - name: Commit si hubo cambios
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update $(date -u +%FT%TZ)"
          git push
